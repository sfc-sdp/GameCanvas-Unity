name: PR (production)
on:
  pull_request:
    types: [opened, synchronize]
    branches: [master]
    paths: ["**.cs"]
jobs:
  dotnet-format:
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_VERSION: 5.0.x
      DOTNET_FORMAT_VERSION: 5.1.250801
      GC_PACKAGE_PATH: ./Packages/GameCanvas/
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Get commit message
        id: log
        run: echo "message=$(git log --no-merges -1 --oneline)" >> "$GITHUB_OUTPUT"

      - name: Check folder existence
        if: contains(steps.log.outputs.message, 'skip ci') != 'true'
        id: check_folder
        run: |
          if [ -d "${{ env.GC_PACKAGE_PATH }}" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET SDK
        if: steps.check_folder.outputs.exists == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install dotnet-format
        if: steps.check_folder.outputs.exists == 'true'
        run: dotnet tool install -g dotnet-format --version ${{ env.DOTNET_FORMAT_VERSION }}

      - name: DryRun dotnet-format
        if: steps.check_folder.outputs.exists == 'true'
        id: format
        run: |
          dotnet-format "${{ env.GC_PACKAGE_PATH }}" --check && rc=0 || rc=$?
          if [ $rc -eq 2 ]; then
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          elif [ $rc -ne 0 ]; then
            echo "::error::dotnet-format failed with exit code $rc"
            exit $rc
          else
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run dotnet-format
        if: steps.format.outputs.has-changes == 'true'
        run: dotnet-format "${{ env.GC_PACKAGE_PATH }}"

      - name: Commit
        if: steps.format.outputs.has-changes == 'true' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -a -m 'refactor: dotnet format [skip ci]
          Co-authored-by: ${{ github.event.pull_request.user.login }} <${{ github.event.pull_request.user.id }}+${{ github.event.pull_request.user.login }}@users.noreply.github.com>'

      - name: Push
        if: steps.format.outputs.has-changes == 'true' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

  test-unity:
    name: Test on Unity ${{ matrix.unity-version }}
    strategy:
      matrix:
        unity-version:
          - 2022.3.24f1
    env:
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
    runs-on: ubuntu-latest
    container:
      image: unityci/editor:ubuntu-${{ matrix.unity-version }}-linux-il2cpp-1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ./Library
          key: ${{ runner.os }}-unity-library-${{ matrix.unity-version }}
          restore-keys: |
            ${{ runner.os }}-unity-library-

      - name: Activate
        id: activate
        run: unity-editor -quit -batchmode -nographics -silent-crashes -logFile -serial ${{ secrets.UNITY_SERIAL }} -username '${{ secrets.UNITY_EMAIL }}' -password '${{ secrets.UNITY_PASSWORD }}' || exit 0

      - name: Test EditMode
        run: unity-editor -batchmode -nographics -silent-crashes -logFile -runTests -testPlatform EditMode -testResults ./test-result-editmode.xml

      - name: Test PlayMode
        run: unity-editor -batchmode -nographics -silent-crashes -logFile -runTests -testPlatform PlayMode -testResults ./test-result-playmode.xml

      - uses: actions/upload-artifact@v4
        if: always() && steps.activate.conclusion == 'success'
        with:
          name: TestRunner Result (${{ matrix.unity-version }})
          path: |
            ./test-result-editmode.xml
            ./test-result-playmode.xml

      - name: Deactivate
        if: always() && steps.activate.conclusion == 'success'
        run: unity-editor -quit -batchmode -nographics -silent-crashes -logFile -returnlicense || exit 0
